  </div>

  <script>
      document.addEventListener("DOMContentLoaded", () => {
          const phItems = document.querySelectorAll(".ph");
          const bgLayers = document.querySelectorAll(".bg-group-layer");

          const firstBg = document.getElementById("bg-photo-1");
          if (firstBg) firstBg.classList.add("active");

          phItems.forEach(item => {
              item.addEventListener("mouseenter", () => {
                  const targetBgId = item.getAttribute("data-target");

                  phItems.forEach(p => p.classList.remove("active"));
                  item.classList.add("active");

                  bgLayers.forEach(bg => bg.classList.remove("active"));

                  const activeBg = document.getElementById(targetBgId);
                  if (activeBg) {
                      activeBg.classList.add("active");
                  }
              });
          });
      });
  </script>
